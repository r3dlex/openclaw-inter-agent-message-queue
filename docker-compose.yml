services:
  iamq:
    build: .
    container_name: openclaw-iamq
    restart: unless-stopped
    ports:
      - "${IAMQ_HTTP_PORT:-18790}:18790"
      - "${IAMQ_WS_PORT:-18793}:18793"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18790/status"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Reusable IAMQ sidecar — build once, used by all agents via
  # `image: openclaw-iamq-sidecar` in their docker-compose.yml.
  # Agents only need to set environment variables for identity.
  sidecar:
    build: ./sidecar
    image: openclaw-iamq-sidecar:latest
    profiles:
      - build-sidecar
