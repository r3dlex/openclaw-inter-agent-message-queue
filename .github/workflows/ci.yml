name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  elixir:
    name: Elixir (compile + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw_mq
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.15"
          otp-version: "26"

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Test
        run: mix test

  python-tools:
    name: Python tools (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check tools/

      - name: Format check
        run: ruff format --check tools/

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t openclaw-iamq:test .
